  <input type="hidden" name="project[files][src/fetch-log.ts]" value='import { ref } from "vue";

export interface FetchLogEntry {
  label: string;
  startTime: number;
  endTime: number;
}

const logEntryList = ref<FetchLogEntry[]>([]);
let baseTime = 0;

export function useFetchLog() {
  return { logEntryList, resetLog, trackFetch };
}

export function resetLog() {
  logEntryList.value = [];
  baseTime = Date.now();
}

export async function trackFetch<T>(
  label: string,
  fetcher: () => Promise<T>
): Promise<T> {
  if (baseTime === 0) {
    baseTime = Date.now();
  }
  const startTime = Date.now() - baseTime;
  const result = await fetcher();
  const endTime = Date.now() - baseTime;
  logEntryList.value.push({ label, startTime, endTime });
  return result;
}'>

  <input type="hidden" name="project[files][src/components/FetchTimeline.vue]" value='<template>
  <div class="timeline">
    <h3>Fetch 時間軸</h3>
    <div v-if="logEntryList.length === 0" class="empty">載入中...</div>
    <div v-for="entry in logEntryList" :key="entry.label" class="entry">
      <span class="label">{{ entry.label }}</span>
      <div class="bar-track">
        <div class="bar" :style="{ left: `${(entry.startTime / maxTime) * 100}%`, width: `${((entry.endTime - entry.startTime) / maxTime) * 100}%` }">
          {{ entry.endTime - entry.startTime }}ms
        </div>
      </div>
      <span class="time">{{ entry.endTime }}ms</span>
    </div>
    <div v-if="logEntryList.length > 0" class="total">總耗時：{{ totalTime }}ms</div>
  </div>
</template>

<script setup lang="ts">
import { computed } from "vue";
import { useFetchLog } from "../fetch-log";

const { logEntryList } = useFetchLog();

const maxTime = computed(() => {
  if (logEntryList.value.length === 0) return 1;
  return Math.max(...logEntryList.value.map((e) => e.endTime));
});

const totalTime = computed(() => {
  if (logEntryList.value.length === 0) return 0;
  return Math.max(...logEntryList.value.map((e) => e.endTime));
});
</script>
